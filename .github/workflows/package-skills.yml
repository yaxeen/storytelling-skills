name: Package skills

# Rebuilds dist/*.skill whenever a skill source changes, and commits the
# packaged files back so dist/ never drifts from skills/.
on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild dist/*.skill from skills/
        run: |
          set -euo pipefail
          mkdir -p dist
          rm -f dist/*.skill
          cd skills
          for dir in */; do
            name="${dir%/}"
            if [ -f "$name/SKILL.md" ]; then
              # Entry path inside the archive must be "<name>/SKILL.md"
              zip -X -q "../dist/$name.skill" "$name/SKILL.md"
              echo "Packaged $name.skill"
            fi
          done

      - name: Commit updated packages
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist
            git commit -m "chore: rebuild dist/*.skill from skills/ [skip ci]"
            git push
          else
            echo "dist already up to date"
          fi
